server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: parking-management

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE:parking_management}?useUnicode=true&characterEncoding=UTF-8&sslMode=REQUIRED
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:db/init/01-schema.sql
      data-locations: classpath:db/init/02-data.sql, classpath:db/init/03-mock-data.sql

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: PtitParking
          secret-key: G18XeUdtfVcoB+Ukcga417kzaaAX5DM4rCuuP7nJUlDQmSKJEZtw/vSH7c3PXn6W
          valid-duration: 3600
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:d22cqcn02n@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  google:
    client-id: ${GOOGLE_CLIENT_ID:google-client-id-here}
